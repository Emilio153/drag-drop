<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Alumnos - Eventos Completos</title>
    <style>
        :root { --primary: #4a90e2; --success: #27ae60; --bg: #f0f2f5; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; }
        
        .container { display: flex; gap: 30px; margin-top: 30px; width: 90%; max-width: 1000px; }
        
        /* Clases que usará el JS */
        .columna { flex: 1; min-height: 400px; background: #fff; border: 2px dashed #cbd5e0; border-radius: 12px; padding: 15px; transition: background 0.2s; }
        .columna-activa { background: #e2e8f0; border-color: var(--primary); }
        
        .alumno { 
            background: var(--primary); color: white; padding: 12px; margin-bottom: 10px; 
            border-radius: 6px; cursor: grab; transition: transform 0.1s, opacity 0.2s; 
        }
        .arrastrando { opacity: 0.4; transform: scale(0.95); }

        /* Interfaz */
        .controles { margin-top: 20px; display: flex; gap: 15px; }
        button { padding: 12px 24px; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; color: white; }
        .btn-nuevo { background: var(--primary); }
        .btn-enviar { background: var(--success); }

        /* Modal simple */
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); justify-content: center; align-items: center; }
        .modal-body { background: white; padding: 25px; border-radius: 8px; width: 300px; display: flex; flex-direction: column; gap: 12px; }
        input { padding: 10px; border: 1px solid #ccc; border-radius: 4px; }
    </style>
</head>
<body>

    <div class="container">
        <div class="columna" id="origen">
            <h2>Alumnos</h2>
            <div id="lista-alumnos"></div>
        </div>

        <div class="columna" id="destino">
            <h2>Seleccionados</h2>
        </div>
    </div>

    <div class="controles">
        <button class="btn-nuevo" id="btnNuevo">NUEVO</button>
        <button class="btn-enviar" id="btnEnviar">ENVIAR</button>
    </div>

    <div id="modal">
        <div class="modal-body">
            <h3>Datos del Alumno</h3>
            <input type="text" id="nombre" placeholder="Nombre">
            <input type="text" id="apellidos" placeholder="Apellidos">
            <input type="number" id="edad" placeholder="Edad">
            <button class="btn-nuevo" id="btnGuardar">Añadir Alumno</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
